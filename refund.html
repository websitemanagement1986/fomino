<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Return and Refund Policy | Fomino</title>
  <link rel="icon" href="assets/favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div id="site-header"></div>
  <section class="legal-page"><div class="container" id="legal-content"></div></section>
  <div id="site-footer"></div>
  <script src="js/products.js"></script>
  <script src="js/cart.js"></script>
  <script src="js/main.js"></script>
  <script>
    renderLegalPage('Return and Refund Policy', `
      <p>Last updated: ${new Date().getFullYear()}</p>
      <p>At <strong>Fomino</strong>, we want you to shop with confidence. This Return and Refund Policy explains when and how you can return items or request a refund for orders placed on our website.</p>

      <h2>1. Return &amp; Refund Window</h2>
      <p>You may initiate a return or refund request within <strong>15 days from the date of purchase</strong> (order confirmation date), provided the item meets the eligibility criteria below.</p>
      <p>For perishable products (fresh fruits and vegetables), please report quality issues within <strong>24 hours of delivery</strong> with supporting photos.</p>

      <h2>2. Eligible Returns &amp; Refunds</h2>
      <ul>
        <li>Wrong item delivered</li>
        <li>Damaged, defective or spoiled items received</li>
        <li>Missing items from your order</li>
        <li>Significantly below-quality perishable produce</li>
        <li>Non-perishable / packaged items returned unused, in original packaging</li>
        <li>Online payment charged but order not confirmed or not fulfilled</li>
      </ul>

      <h2>3. How to Request a Return or Refund</h2>
      <ol>
        <li>Contact us with your <strong>order ID</strong>, item name and reason for return/refund.</li>
        <li>Share clear photos or videos if the item is damaged, incorrect or of poor quality.</li>
        <li>Our support team will review your request and confirm eligibility within 1–2 business days.</li>
        <li>Approved returns may be picked up by our delivery partner or you may be asked to ship the item back (for non-perishable goods).</li>
      </ol>
      <p>Call <a href="tel:+917840819741">+91 7840819741</a> or email <a href="mailto:support@fominomart.in">support@fominomart.in</a>.</p>

      <h2>4. Refund Processing</h2>
      <ul>
        <li><strong>Online payments:</strong> Refunds are credited to the original payment method within <strong>5–7 business days</strong> after we receive and inspect the returned item (or approve the claim for perishables).</li>
        <li><strong>COD orders:</strong> Refunds are issued via bank transfer or store credit after verification.</li>
        <li><strong>Shipping charges:</strong> Delivery fees are non-refundable unless the return is due to our error (wrong or defective item).</li>
        <li><strong>Replacement:</strong> Where possible, we may offer a free replacement instead of a refund.</li>
      </ul>

      <h2>5. Non-Returnable &amp; Non-Refundable Items</h2>
      <ul>
        <li>Opened or used packaged food items</li>
        <li>Perishable items reported after 24 hours of delivery</li>
        <li>Products damaged due to improper storage after delivery</li>
        <li>Requests raised after the 15-day return window</li>
        <li>Products marked as non-returnable at the time of purchase</li>
      </ul>

      <h2>6. Cancellations</h2>
      <p>Orders cancelled before dispatch are eligible for a full refund. See our <a href="cancellation.html">Cancellation Policy</a> for details.</p>

      <h2>7. Contact</h2>
      <p>Fomino Product Hub Pvt Ltd, Office no O-1231, Gaur City Centre, Sec-4, Greater Noida West, Gautam Buddha Nagar, UP 201318.</p>
      <p>Contact: Pavan Kumar | Phone: <a href="tel:+917840819741">+91 7840819741</a> | Email: <a href="mailto:support@fominomart.in">support@fominomart.in</a></p>
    `);
  </script>
</body>
</html>
