<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Checkout | Fomino</title>
  <link rel="icon" href="assets/favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div id="site-header"></div>
  <div class="page-header"><div class="container"><h1>Checkout</h1><p>Guest checkout — no login required</p></div></div>
  <section>
    <div class="container checkout-grid">
      <div class="checkout-form">
        <h2>Delivery Details</h2>
        <div id="checkout-errors"></div>
        <div class="form-group"><label for="name">Full Name *</label><input type="text" id="name" required placeholder="Enter your full name"></div>
        <div class="form-group"><label for="email">Email Address *</label><input type="email" id="email" required placeholder="you@example.com"></div>
        <div class="form-group"><label for="phone">Mobile Number *</label><input type="tel" id="phone" required placeholder="10-digit mobile number"></div>
        <div class="form-group"><label for="address">Delivery Address *</label><textarea id="address" rows="2" required placeholder="House/Flat, Street, Landmark"></textarea></div>
        <div class="form-row">
          <div class="form-group"><label for="city">City *</label><input type="text" id="city" required placeholder="City" value="Greater Noida West"></div>
          <div class="form-group"><label for="state">State *</label><input type="text" id="state" required value="Uttar Pradesh"></div>
        </div>
        <div class="form-group"><label for="pincode">Pincode *</label><input type="text" id="pincode" required placeholder="6-digit pincode" maxlength="6"></div>

        <h2 style="margin-top:24px;">Payment Method</h2>
        <div class="payment-methods">
          <label class="payment-option">
            <input type="radio" name="payment" value="upi" checked>
            <span>📱 UPI (GPay, PhonePe, Paytm &amp; more)</span>
          </label>
          <label class="payment-option">
            <input type="radio" name="payment" value="debit" disabled>
            <span>💳 Debit Card <small>(coming soon)</small></span>
          </label>
          <label class="payment-option">
            <input type="radio" name="payment" value="netbanking" disabled>
            <span>🏦 Net Banking <small>(coming soon)</small></span>
          </label>
          <label class="payment-option">
            <input type="radio" name="payment" value="cod">
            <span>💵 Cash on Delivery (Pay when delivered)</span>
          </label>
        </div>

        <p style="font-size:0.85rem;color:var(--text-muted);margin-bottom:16px;">
          By placing this order, you agree to our <a href="terms.html">Terms &amp; Conditions</a>, <a href="shipping.html">Shipping Policy</a>, <a href="refund.html">Return &amp; Refund Policy</a> and <a href="privacy.html">Privacy Policy</a>.
        </p>
        <button id="pay-btn" class="btn btn-primary btn-lg" style="width:100%;">Pay Now</button>
      </div>
      <div id="checkout-summary" class="checkout-summary"></div>
    </div>
  </section>
  <div id="site-footer"></div>
  <script src="js/products.js"></script>
  <script src="js/cart.js"></script>
  <script src="js/main.js"></script>
  <script src="js/checkout.js"></script>
</body>
</html>
